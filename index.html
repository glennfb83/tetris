<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        canvas {
            border: 3px solid #fff;
            background: #000;
            display: block;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 200px;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .score-item {
            margin-bottom: 15px;
        }

        .score-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }

        .next-piece {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .next-label {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        #nextCanvas {
            border: 2px solid #333;
            background: #111;
            display: block;
            margin: 0 auto;
        }

        .controls {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .controls h3 {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .control-row {
            margin-bottom: 8px;
            font-size: 13px;
            color: #ddd;
        }

        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #667eea;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: #667eea;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .high-scores {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
            max-height: 300px;
            overflow-y: auto;
        }

        .high-scores h3 {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .score-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }

        .score-entry:last-child {
            border-bottom: none;
        }

        .score-rank {
            color: #aaa;
        }

        .score-value-list {
            color: #667eea;
            font-weight: bold;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-content {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid #667eea;
        }

        .game-over-content h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .game-over-content p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .game-over-content button {
            width: 200px;
            margin-top: 20px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-screen-content {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid #667eea;
        }

        .start-screen-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .start-screen-content p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ddd;
        }

        .start-screen-content button {
            width: 200px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }

            .sidebar {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="start-screen" id="startScreen">
        <div class="start-screen-content">
            <h1>TETRIS</h1>
            <p>Classic block-dropping puzzle</p>
            <button id="startBtn">Start Game</button>
        </div>
    </div>

    <div class="container">
        <div class="game-area">
            <canvas id="gameCanvas" width="200" height="400"></canvas>
            <div class="buttons">
                <button id="pauseBtn">Pause</button>
                <button id="resetBtn">New Game</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Lines</div>
                    <div class="score-value" id="lines">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Level</div>
                    <div class="score-value" id="level">1</div>
                </div>
                <div class="score-item">
                    <div class="score-label">High Score</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>

            <div class="next-piece">
                <div class="next-label">Next Piece</div>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>

            <div class="controls">
                <h3>Controls</h3>
                <div class="control-row"><span class="key">←</span> / <span class="key">→</span> Move</div>
                <div class="control-row"><span class="key">↓</span> Soft Drop</div>
                <div class="control-row"><span class="key">Space</span> Hard Drop</div>
                <div class="control-row"><span class="key">Z</span> / <span class="key">X</span> Rotate</div>
                <div class="control-row"><span class="key">P</span> Pause</div>
            </div>

            <div class="high-scores">
                <h3>High Scores</h3>
                <div id="scoresList"></div>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p id="newHighScoreMsg" style="color: #ffd700; font-weight: bold; display: none;">🎉 NEW HIGH SCORE! 🎉</p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        // Constants
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 20;

        const PIECES = [
            { shape: [[1,1,1,1]], color: '#00f0f0' },           // I
            { shape: [[1,1],[1,1]], color: '#f0f000' },         // O
            { shape: [[0,1,0],[1,1,1]], color: '#f000f0' },     // T
            { shape: [[1,0,0],[1,1,1]], color: '#00f000' },     // L
            { shape: [[0,0,1],[1,1,1]], color: '#f00000' },     // J
            { shape: [[0,1,1],[1,1,0]], color: '#ff8800' },     // S
            { shape: [[1,1,0],[0,1,1]], color: '#0088ff' }      // Z
        ];

        // Game state
        let board = createBoard();
        let currentPiece = getRandomPiece();
        let nextPiece = getRandomPiece();
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameOver = false;
        let isPaused = false;
        let gameStarted = false;
        let highScores = loadHighScores();
        let highScore = highScores[0]?.score || 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        let dropCounter = 0;
        let dropInterval = getDropInterval();

        // Initialize
        function init() {
            board = createBoard();
            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            score = 0;
            lines = 0;
            level = 1;
            gameOver = false;
            isPaused = false;
            gameStarted = true;
            dropCounter = 0;
            dropInterval = getDropInterval();
            updateScore();
            updateHighScore();
            draw();
        }

        function createBoard() {
            return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }

        function getRandomPiece() {
            const piece = PIECES[Math.floor(Math.random() * PIECES.length)];
            return {
                shape: piece.shape,
                color: piece.color,
                x: Math.floor(COLS / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        function getDropInterval() {
            return Math.max(100, 1000 - (level - 1) * 50);
        }

        function canMove(piece, dx, dy) {
            const newX = piece.x + dx;
            const newY = piece.y + dy;

            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const x = newX + col;
                        const y = newY + row;

                        if (x < 0 || x >= COLS || y >= ROWS) return false;
                        if (y >= 0 && board[y][x]) return false;
                    }
                }
            }
            return true;
        }

        function rotatePiece(piece) {
            const shape = piece.shape;
            const rotated = shape[0].map((_, col) => 
                shape.map(row => row[col]).reverse()
            );
            
            const originalShape = piece.shape;
            piece.shape = rotated;

            // Wall kick
            if (!canMove(piece, 0, 0)) {
                for (let offset = 1; offset <= 2; offset++) {
                    if (canMove(piece, offset, 0)) {
                        piece.x += offset;
                        return;
                    }
                    if (canMove(piece, -offset, 0)) {
                        piece.x -= offset;
                        return;
                    }
                }
                piece.shape = originalShape;
            }
        }

        function placePiece(piece) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const x = piece.x + col;
                        const y = piece.y + row;
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
                            board[y][x] = piece.color;
                        } else if (y < 0) {
                            gameOver = true;
                        }
                    }
                }
            }
        }

        function clearLines() {
            let linesCleared = 0;
            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell)) {
                    board.splice(row, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    row++;
                }
            }

            if (linesCleared > 0) {
                lines += linesCleared;
                const points = [40, 100, 300, 1200];
                score += points[linesCleared - 1] * level;
                level = Math.floor(lines / 10) + 1;
                dropInterval = getDropInterval();
            }
        }

        function update(deltaTime) {
            if (!gameStarted || gameOver || isPaused) return;

            dropCounter += deltaTime;

            if (dropCounter > dropInterval) {
                if (canMove(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    placePiece(currentPiece);
                    clearLines();
                    currentPiece = nextPiece;
                    nextPiece = getRandomPiece();

                    if (!canMove(currentPiece, 0, 0)) {
                        gameOver = true;
                    }
                }
                dropCounter = 0;
            }

            updateScore();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // Draw board
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        ctx.fillStyle = board[row][col];
                        ctx.fillRect(col * BLOCK_SIZE + 1, row * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(col * BLOCK_SIZE + 1, row * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    }
                }
            }

            // Draw current piece
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const x = currentPiece.x + col;
                        const y = currentPiece.y + row;
                        if (y >= 0) {
                            ctx.fillStyle = currentPiece.color;
                            ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                        }
                    }
                }
            }

            // Draw pause overlay
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }

            // Draw game over overlay
            if (gameOver) {
                showGameOverScreen();
            }

            drawNextPiece();
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#111';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            const pieceSize = 15;
            const offsetX = (nextCanvas.width - nextPiece.shape[0].length * pieceSize) / 2;
            const offsetY = (nextCanvas.height - nextPiece.shape.length * pieceSize) / 2;

            for (let row = 0; row < nextPiece.shape.length; row++) {
                for (let col = 0; col < nextPiece.shape[row].length; col++) {
                    if (nextPiece.shape[row][col]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(
                            offsetX + col * pieceSize + 1,
                            offsetY + row * pieceSize + 1,
                            pieceSize - 2,
                            pieceSize - 2
                        );
                    }
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('lines').textContent = lines;
            document.getElementById('level').textContent = level;
        }

        function updateHighScore() {
            if (score > highScore) {
                highScore = score;
                saveHighScore(score);
                highScores = loadHighScores();
            }
            document.getElementById('highScore').textContent = highScore;
            renderHighScores();
        }

        function saveHighScore(newScore) {
            // Check if this exact score already exists
            if (!highScores.some(entry => entry.score === newScore)) {
                highScores.push({ score: newScore, date: new Date().toLocaleDateString() });
            }
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 10); // Keep top 10
            localStorage.setItem('tetrisHighScores', JSON.stringify(highScores));
        }

        function loadHighScores() {
            const stored = localStorage.getItem('tetrisHighScores');
            return stored ? JSON.parse(stored) : [];
        }

        function renderHighScores() {
            const list = document.getElementById('scoresList');
            list.innerHTML = highScores.map((entry, idx) => 
                `<div class="score-entry">
                    <span class="score-rank">#${idx + 1}</span>
                    <span class="score-value-list">${entry.score}</span>
                </div>`
            ).join('');
        }

        function showGameOverScreen() {
            const isNewHighScore = score > (highScores[0]?.score || 0);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('newHighScoreMsg').style.display = isNewHighScore ? 'block' : 'none';

            if (isNewHighScore) {
                saveHighScore(score);
                updateHighScore();
            }

            document.getElementById('gameOverScreen').classList.add('show');
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (!gameStarted || gameOver || isPaused) {
                if (e.key === 'p' || e.key === 'P') {
                    isPaused = !isPaused;
                    document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
                }
                return;
            }

            switch (e.key.toLowerCase()) {
                case 'arrowleft':
                    if (canMove(currentPiece, -1, 0)) currentPiece.x--;
                    break;
                case 'arrowright':
                    if (canMove(currentPiece, 1, 0)) currentPiece.x++;
                    break;
                case 'arrowdown':
                    if (canMove(currentPiece, 0, 1)) currentPiece.y++;
                    break;
                case ' ':
                    e.preventDefault();
                    while (canMove(currentPiece, 0, 1)) {
                        currentPiece.y++;
                    }
                    break;
                case 'z':
                    rotatePiece(currentPiece);
                    break;
                case 'x':
                    rotatePiece(currentPiece);
                    rotatePiece(currentPiece);
                    rotatePiece(currentPiece);
                    break;
                case 'p':
                    isPaused = !isPaused;
                    document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
                    break;
            }
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            init();
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (gameStarted && !gameOver) {
                isPaused = !isPaused;
                document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').classList.remove('show');
            document.getElementById('startScreen').classList.remove('hidden');
            gameStarted = false;
        });

        // Game loop
        let lastTime = 0;
        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            update(deltaTime);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Load high scores and start loop
        renderHighScores();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
